<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="/icon-v2.png">
  <link href="/css/bootstrap.min.css" rel="stylesheet">

  <style>

    .error-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }

<body>
  <div class="error-wrap">
